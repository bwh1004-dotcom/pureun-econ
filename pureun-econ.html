const EPISODES=[
{id:1,title:"편의점 아빠가 알려주는 경제 이야기",emoji:"🏪",tag:"기초",
pages:[
{text:"우노짱이 편의점 카운터에 앉아 있었다.\n\n\"푸른아, 아빠가 왜 매일 이 편의점에서 일하는지 알아?\"",illust:"ep1-1.jpg"},
{text:"\"돈 벌려고요?\"\n\n우노짱이 웃었다.\n\"맞아. 근데 그게 바로 경제의 시작이야. 사람은 원하는 게 너무 많은데, 그걸 다 가질 수 없거든.\"",illust:"ep1-2.jpg"},
{text:"📖 희소성이란?\n\n사람의 욕구는 무한하지만 자원(돈, 시간, 물건)은 한정되어 있어요.\n\n이 차이를 '희소성'이라고 해요.\n경제학은 이 희소성 때문에 생겨났어요.",illust:"ep1-3.jpg"},
{text:"\"아빠, 그럼 뭘 선택해야 해요?\"\n\n\"그래서 선택이 필요한 거야. 뭔가를 선택하면, 다른 걸 포기해야 하지.\"\n\n우노짱이 편의점 선반을 가리켰다.\n\"이 초콜릿을 살 돈으로 과자를 살 수도 있잖아.\"",illust:"ep1-4.jpg"},
{text:"📖 기회비용이란?\n\n선택으로 인해 포기한 것의 가치를 '기회비용'이라고 해요.\n\n✅ 예시:\n초콜릿(1,500원)을 사면\n→ 과자(1,500원)를 못 사는 것이 기회비용\n\n합리적인 선택 = 기회비용보다 얻는 것이 더 클 때",illust:"ep1-5.jpg"},
{text:"\"그럼 어떻게 선택해요?\"\n\n\"이득이 비용보다 클 때 선택하는 거야.\"\n\n오짱이 끼어들었다.\n\"우노짱! 그게 바로 경제적 사고야!\"",illust:"ep1-6.jpg"},
{text:"📖 경제란 무엇인가?\n\n경제(Economy)는 희소한 자원을 어떻게 배분할지 결정하는 모든 활동이에요.\n\n• 개인 → 무엇을 사고 어떻게 저축할까?\n• 기업 → 무엇을 얼마나 생산할까?\n• 정부 → 세금을 어디에 쓸까?\n• 나라 → 다른 나라와 어떻게 거래할까?",illust:"ep1-7.jpg"},
{text:"푸른이가 고개를 끄덕였다.\n\n\"경제가 이렇게 가까이 있는 거였어요?\"\n\n우노짱이 웃으며 말했다.\n\"응. 편의점 하나에 경제학이 다 담겨 있어.\"\n\n오늘부터 푸른이의 경제 여행이 시작됐다.",illust:"ep1-8.jpg"}
],
quiz:{q:"어떤 것을 선택할 때 포기한 다른 선택의 가치를 무엇이라고 할까요?",options:["희소성","기회비용","수요","공급"],answer:1,explain:"선택으로 인해 포기한 것의 가치를 기회비용이라고 해요. 합리적 선택은 기회비용보다 얻는 것이 더 클 때입니다."}},

{id:2,title:"용돈으로 배우는 수입과 지출",emoji:"💰",tag:"기초",
pages:[
{text:"\"아빠, 이번 달 용돈 다 썼어요.\"\n\n우노짱이 눈썹을 올렸다.\n\"언제 다 썼어? 이번 달 시작한 지 얼마 안 됐는데.\"",illust:"ep2-1.jpg"},
{text:"\"친구들이랑 분식도 먹고, 게임도 충전하고...\"\n\n\"푸른아, 가계부를 써본 적 있어?\"\n\n\"가계부요? 그게 뭐예요?\"",illust:"ep2-2.jpg"},
{text:"📖 가계수지란?\n\n가정의 수입(들어오는 돈)과 지출(나가는 돈)을 비교한 것이에요.\n\n수입 > 지출 = 흑자 (남는 돈이 있음)\n수입 < 지출 = 적자 (빚이 생김)\n\n우리나라 통계청은 표본 가계의 수입·지출을 조사해 '가계수지 통계'를 발표해요.",illust:"ep2-3.jpg"},
{text:"우노짱이 메모장을 펼쳤다.\n\n\"수입: 용돈 30,000원\n지출: 분식 8,000원, 게임 15,000원, 간식 9,000원\n\n합계: 32,000원 지출\"\n\n\"2,000원 적자네!\"",illust:"ep2-4.jpg"},
{text:"📖 저축이란?\n\n수입 중에서 지출하고 남은 금액을 저축이라고 해요.\n\n저축률 = 저축액 ÷ 소득 × 100\n\n💡 가계순저축률\n한국의 가계저축률은 선진국 대비 높은 편이에요.\n저축은 미래를 위한 가장 기본적인 경제 행동이에요.",illust:"ep2-5.jpg"},
{text:"\"그럼 어떻게 해야 해요?\"\n\n오짱이 말했다.\n\"지출을 줄이거나, 수입을 늘리거나!\"\n\n우노짱이 덧붙였다.\n\"그리고 반드시 필요한 것(필수 지출)과 있으면 좋은 것(선택 지출)을 구분해야 해.\"",illust:"ep2-6.jpg"},
{text:"📖 처분가능소득이란?\n\n세금, 보험료 등을 내고 실제로 내가 쓸 수 있는 소득이에요.\n\n가계처분가능소득 = 총소득 - 세금 - 사회보험료\n\n💡 1인당 가계총처분가능소득(PGDI)은\n국민의 실제 구매력을 보여주는 가장 정확한 소득 지표예요.",illust:"ep2-7.jpg"},
{text:"푸른이가 메모장을 꺼냈다.\n\n\"저도 가계부 써볼게요!\"\n\n우노짱이 웃었다.\n\"용돈 관리가 가능한 사람이\n나중에 큰돈도 관리할 수 있어.\n\n경제는 내 지갑에서 시작되거든.\"",illust:"ep2-8.jpg"}
],
quiz:{q:"세금 등을 제외하고 실제로 사용할 수 있는 소득을 무엇이라고 할까요?",options:["총소득","처분가능소득","순이익","저축"],answer:1,explain:"처분가능소득은 총소득에서 세금, 사회보험료 등을 제외하고 실제 소비와 저축으로 쓸 수 있는 소득이에요."}},

{id:3,title:"물건 값이 왜 오를까?",emoji:"🔥",tag:"기초",
pages:[
{text:"편의점에서 팔던 삼각김밥이 500원에서 600원이 됐다.\n\n\"아빠, 왜 갑자기 비싸졌어요?\"\n\n우노짱이 진지하게 답했다.\n\"인플레이션이야.\"",illust:"ep3-1.jpg"},
{text:"📖 인플레이션이란?\n\n전반적인 물가 수준이 지속적으로 오르는 현상이에요.\n\n물가가 오르면 같은 돈으로 살 수 있는 물건이 줄어요.\n즉, 돈의 가치가 떨어지는 것이에요.\n\n반대로 물가가 내려가면 → 디플레이션",illust:"ep3-2.jpg"},
{text:"\"왜 물가가 올라요?\"\n\n\"크게 두 가지야.\"\n\n우노짱이 손가락을 폈다.\n\"첫째, 사람들이 물건을 너무 많이 사려고 할 때.\n둘째, 물건 만드는 비용이 올라갈 때.\"",illust:"ep3-3.jpg"},
{text:"📖 인플레이션의 원인\n\n① 수요 인플레이션\n사람들이 많이 사려고 해서 물가 상승\n(경기 과열, 돈이 많이 풀릴 때)\n\n② 비용 인플레이션\n원자재·인건비 상승으로 물가 상승\n(유가 급등, 임금 인상)\n\n③ 통화량 과잉\n돈을 너무 많이 찍어내도 물가 상승",illust:"ep3-4.jpg"},
{text:"\"그럼 물가는 어떻게 측정해요?\"\n\n오짱이 답했다.\n\"소비자물가지수! CPI야!\"\n\n\"CPI는 우리가 자주 사는 물건들의 평균 가격 변화를 보여주는 지표야.\"",illust:"ep3-5.jpg"},
{text:"📖 소비자물가지수(CPI)\n\nConsumer Price Index\n일반 가계가 구매하는 대표 상품·서비스의 가격 변동을 측정\n\n통계청이 매달 발표해요.\n\n• CPI 상승 = 인플레이션\n• 중앙은행 목표: 연 2% 내외\n\n💡 생산자물가지수(PPI)는 CPI의 선행 지표 역할",illust:"ep3-6.jpg"},
{text:"\"인플레이션이 나쁜 건가요?\"\n\n\"적당한 인플레이션은 경제 성장의 신호야.\"\n\n우노짱이 설명했다.\n\"너무 낮으면(디플레이션) 사람들이 물건을 안 사고,\n너무 높으면 돈 가치가 떨어져서 혼란이 생겨.\"",illust:"ep3-7.jpg"},
{text:"📖 물가 신호등\n\n🟢 1~2% 안정 (목표 구간)\n🟡 2~4% 주의 (금리 인상 검토)\n🔴 4% 이상 과열 (긴축 정책)\n⚫ 0% 이하 디플레이션 위험\n\n경제가 건강하다는 건\n물가가 적당히 오르면서\n성장도 이어지는 상태예요.",illust:"ep3-8.jpg"}
],
quiz:{q:"소비자들이 구매하는 상품·서비스의 평균 가격 변동을 나타내는 지표는?",options:["GDP","PPI","CPI","GNI"],answer:2,explain:"CPI(소비자물가지수)는 일반 가계가 구매하는 대표 상품·서비스의 가격 변동을 측정하는 인플레이션의 대표 지표예요."}},

{id:4,title:"은행은 왜 이자를 줄까?",emoji:"🏦",tag:"기초",
pages:[
{text:"오짱이 통장을 들고 왔다.\n\n\"우노짱! 저 용돈 모아서 은행에 넣었더니\n이자가 생겼어요!\"\n\n\"당연하지. 은행이 네 돈을 빌려 쓴 거야.\"",illust:"ep4-1.jpg"},
{text:"📖 은행이 이자를 주는 이유\n\n은행은 예금자의 돈을 모아서 다른 사람에게 대출해줘요.\n\n대출 이자(더 높음) - 예금 이자(더 낮음) = 은행 이익\n\n이것을 '예대마진'이라고 해요.\n\n💡 은행은 돈을 중간에서 연결해주는 '금융 중개기관'이에요.",illust:"ep4-2.jpg"},
{text:"\"그럼 이자가 높을수록 좋은 거 아닌가요?\"\n\n우노짱이 고개를 저었다.\n\"이자는 '금리'라고 해. 금리가 오르면 좋은 점도, 나쁜 점도 있어.\"",illust:"ep4-3.jpg"},
{text:"📖 금리란?\n\n돈을 빌리는 대가로 지불하는 비용의 비율이에요.\n\n💰 예금 금리: 은행에 맡기면 받는 이자\n💸 대출 금리: 은행에서 빌리면 내는 이자\n\n금리 인상 시:\n• 예금자 유리 (이자 더 받음)\n• 대출자 불리 (이자 더 냄)\n• 소비·투자 감소",illust:"ep4-4.jpg"},
{text:"\"복리라는 것도 있던데요?\"\n\n오짱이 눈을 반짝였다.\n\n\"복리! 세상에서 가장 강력한 힘!\n아인슈타인이 '인류 최고의 발명'이라고 했어.\"",illust:"ep4-5.jpg"},
{text:"📖 단리 vs 복리\n\n💡 단리: 원금에만 이자 계산\n100만원 × 5% × 10년 = 150만원\n\n🚀 복리: 이자에도 이자 계산\n100만원 × (1+5%)^10 = 163만원\n\n차이는 13만원이지만\n30년이면: 단리 250만원 vs 복리 432만원\n\n시간이 길수록 복리의 힘은 폭발적!",illust:"ep4-6.jpg"},
{text:"\"그럼 빨리 시작할수록 좋겠네요!\"\n\n우노짱이 고개를 끄덕였다.\n\n\"맞아. 푸른이가 지금 저축을 시작하면\n아빠가 30살에 시작하는 것보다\n훨씬 유리해.\"",illust:"ep4-7.jpg"},
{text:"📖 72의 법칙\n\n투자금이 2배가 되는 데 걸리는 시간\n= 72 ÷ 연이율\n\n예시:\n• 연 6% → 72÷6 = 12년 후 2배\n• 연 8% → 72÷8 = 9년 후 2배\n• 연 12% → 72÷12 = 6년 후 2배\n\n복리와 시간이 만나면 기적이 일어나요.",illust:"ep4-8.jpg"}
],
quiz:{q:"이자가 붙은 금액에 또 이자가 붙는 방식을 무엇이라고 할까요?",options:["단리","복리","가산금리","기준금리"],answer:1,explain:"복리는 원금뿐 아니라 이미 발생한 이자에도 이자가 붙는 방식이에요. 시간이 길수록 단리와의 차이가 크게 벌어져요."}},

{id:5,title:"나라 살림은 어떻게 굴러가나",emoji:"🏛️",tag:"기초",
pages:[
{text:"\"아빠, 나라도 살림을 해요?\"\n\n우노짱이 웃었다.\n\"응. 나라도 수입이 있고 지출이 있어.\n그걸 '재정'이라고 해.\"",illust:"ep5-1.jpg"},
{text:"📖 나라의 수입: 세금\n\n정부의 주요 수입원은 세금이에요.\n\n📌 직접세: 소득세, 법인세 (납세자=부담자)\n📌 간접세: 부가가치세, 개별소비세 (납세자≠부담자)\n\n간접세는 징수가 편하지만\n소득이 낮을수록 부담률이 높은 '역진성' 문제가 있어요.",illust:"ep5-2.jpg"},
{text:"\"세금 내기 싫은데요.\"\n\n오짱이 끼어들었다.\n\"그래도 세금이 없으면\n도로, 학교, 병원, 군대가 없어!\"\n\n\"맞아. 세금은 우리가 함께 쓰는 것들을 위해 내는 거야.\"",illust:"ep5-3.jpg"},
{text:"📖 GDP(국내총생산)\n\n일정 기간 한 나라 안에서 생산된\n모든 최종 재화·서비스의 시장가치 합계\n\nGDP = 민간소비(C) + 투자(I) + 정부지출(G) + 순수출(X-M)\n\n나라 경제 규모의 대표 지표!\n한국 GDP = 세계 약 13위권 (약 1조 7천억 달러)",illust:"ep5-4.jpg"},
{text:"\"GDP가 크면 잘사는 나라인가요?\"\n\n우노짱이 설명했다.\n\"GDP 총량보다 '1인당 GDP'가 중요해.\n인구가 많으면 GDP 총량이 커도\n개개인은 가난할 수 있거든.\"",illust:"ep5-5.jpg"},
{text:"📖 GDP vs GNI\n\nGDP: 국내에서 생산된 가치 (장소 기준)\nGNI: 우리 국민이 번 소득 (국적 기준)\n\nGNI = GDP + 해외에서 받은 소득 - 해외로 나간 소득\n\n💡 삼성이 베트남에서 번 돈은?\n→ 베트남 GDP에 포함\n→ 한국 GNI에 포함",illust:"ep5-6.jpg"},
{text:"\"재정적자가 뭐예요?\"\n\n\"나라 살림이 적자라는 뜻이야.\n세금(수입)보다 지출이 많으면 빚을 져.\"\n\n\"나라도 빚을 져요?\"\n\n\"응. 이걸 '국가채무'라고 해.\"",illust:"ep5-7.jpg"},
{text:"📖 재정수지와 국가채무\n\n재정수지 = 세입 - 세출\n\n• 흑자: 여유 자금 발생\n• 적자: 국채 발행으로 조달\n\n국가채무비율(GDP 대비 %)로 건전성 평가\n한국: 약 50% (OECD 평균 80~90%보다 낮은 편)\n\n💡 경기 침체 시 적자 재정으로 경기 부양하는 것은 정상!",illust:"ep5-8.jpg"}
],
quiz:{q:"일정 기간 한 나라 안에서 생산된 모든 최종 재화와 서비스의 시장가치를 무엇이라 할까요?",options:["GNI","CPI","GDP","재정수지"],answer:2,explain:"GDP(국내총생산)는 나라의 경제 규모를 나타내는 대표 지표예요. GNI는 국적을 기준으로 우리 국민이 번 소득의 합계라는 점에서 달라요."}},

{id:6,title:"한국은행은 왜 금리를 바꿀까?",emoji:"🎯",tag:"심화",
pages:[
{text:"뉴스에서 기자가 말했다.\n\n\"오늘 한국은행이 기준금리를 0.25%p 인상했습니다.\"\n\n\"아빠, 기준금리가 뭐예요?\"",illust:"ep6-1.jpg"},
{text:"📖 한국은행이란?\n\n대한민국의 중앙은행이에요.\n\n✅ 주요 역할:\n• 돈(화폐) 발행\n• 기준금리 결정\n• 물가안정 목표 운영 (연 2%)\n• 금융시스템 안정\n• 외환보유액 운용\n\n금융통화위원회(7명)가 기준금리 결정",illust:"ep6-2.jpg"},
{text:"\"기준금리가 오르면 어떻게 돼요?\"\n\n우노짱이 그림을 그렸다.\n\n기준금리↑ → 대출금리↑ → 사람들이 덜 빌림\n→ 소비·투자↓ → 물가↓\n\n\"물가를 잡으려면 금리를 올려!\"",illust:"ep6-3.jpg"},
{text:"📖 통화정책 3가지 수단\n\n🎯 ① 기준금리 조정\n가장 강력한 도구. 모든 금리의 기준점.\n\n📈 ② 공개시장운영\n국채를 사면(통화 공급) 팔면(통화 회수)\n\n🏦 ③ 지급준비율\n은행이 예금 중 의무 보유 비율 조정\n비율↑ → 대출 가능 자금↓",illust:"ep6-4.jpg"},
{text:"\"그럼 항상 금리를 올리는 게 좋은 거 아닌가요?\"\n\n오짱이 손을 들었다.\n\n\"아니야! 금리를 너무 올리면\n기업이 투자를 안 해서 경기가 나빠져!\"",illust:"ep6-5.jpg"},
{text:"📖 금리 딜레마\n\n금리 인상: 물가↓ But 경기↓\n금리 인하: 경기↑ But 물가↑\n\n중앙은행의 임무:\n물가 안정 + 경제 성장을 동시에!\n\n이게 너무 어려워서\n전문가 7명이 매달 머리를 맞대고 결정해요.",illust:"ep6-6.jpg"},
{text:"\"금리가 0%에 가까워지면요?\"\n\n\"그때 나오는 게 '양적완화'야.\"\n\n우노짱이 말했다.\n\"금리를 더 내릴 수 없을 때\n중앙은행이 직접 시장에서\n채권을 사서 돈을 푸는 거야.\"",illust:"ep6-7.jpg"},
{text:"📖 양적완화(QE)\n\n금리가 0% 근처일 때 쓰는 비전통적 통화정책\n\n중앙은행이 국채·자산을 대규모 매입\n→ 시중에 돈 공급 증가\n→ 이자율 추가 하락 효과\n\n2008년 글로벌 금융위기 후\n미국 연준이 대규모로 실시해 경기 회복에 기여했어요.",illust:"ep6-8.jpg"}
],
quiz:{q:"중앙은행이 금리가 0%에 가까울 때 국채 등을 매입해 유동성을 공급하는 정책은?",options:["재정정책","지급준비제도","양적완화","공개시장운영"],answer:2,explain:"양적완화(QE)는 금리를 더 내릴 수 없을 때 중앙은행이 직접 자산을 매입해 시중에 돈을 공급하는 비전통적 통화정책이에요."}},

{id:7,title:"경기는 왜 오르내릴까?",emoji:"🔄",tag:"심화",
pages:[
{text:"\"아빠, 요즘 경기가 안 좋다고 하는데\n경기가 뭐예요?\"\n\n우노짱이 말했다.\n\"경기는 경제 활동의 온도야.\n따뜻하면 호황, 차가우면 불황이지.\"",illust:"ep7-1.jpg"},
{text:"📖 경기란?\n\n경제 전체의 활동 수준을 말해요.\n\n• 경기 호황: 생산↑, 고용↑, 소득↑, 소비↑\n• 경기 불황: 생산↓, 고용↓, 소득↓, 소비↓\n\n경기는 언제나 좋을 수도, 나쁠 수도 없어요.\n반드시 순환해요.",illust:"ep7-2.jpg"},
{text:"\"그럼 경기가 항상 오르내리는 건가요?\"\n\n오짱이 그림을 그렸다.\n\n\"맞아! 이게 경기순환이야.\n팽창→정점→수축→저점→팽창...\n이게 반복돼.\"",illust:"ep7-3.jpg"},
{text:"📖 경기순환 4단계\n\n📈 팽창(확장): 생산·고용·소비 증가\n🔝 정점(호황): 성장이 최고조, 인플레 압력\n📉 수축(침체): 생산·투자·소비 감소\n🔻 저점(불황): 실업 증가, 물가 하락\n\n보통 한 사이클 = 수년~십수년\n정부와 중앙은행이 이 진폭을 줄이려 노력해요.",illust:"ep7-4.jpg"},
{text:"\"경기를 미리 알 수 있나요?\"\n\n우노짱이 말했다.\n\"그래서 경기 지표가 있어.\n미래를 예측하는 선행지수,\n현재를 보여주는 동행지수,\n나중에 확인되는 후행지수.\"",illust:"ep7-5.jpg"},
{text:"📖 경기종합지수(CI)\n\n개별 경제지표를 합성해 만든 경기 종합 지수\n통계청이 매달 발표\n\n📊 선행종합지수: 미래 경기 예측\n(주가, 건축허가면적, 소비자기대지수 등)\n\n📊 동행종합지수: 현재 경기\n(산업생산지수, 소매판매액지수 등)\n\n📊 후행종합지수: 과거 경기 확인\n(실업률, 회사채유통수익률 등)",illust:"ep7-6.jpg"},
{text:"\"가장 무서운 경기 침체는 뭐예요?\"\n\n오짱이 말했다.\n\"2008년 글로벌 금융위기!\"\n\n우노짱이 덧붙였다.\n\"미국 집값 거품이 꺼지면서\n전 세계 금융이 마비된 사건이야.\"",illust:"ep7-7.jpg"},
{text:"📖 경기를 읽는 생활 속 신호들\n\n🏠 부동산 가격 하락 → 경기 냉각 신호\n📉 주가 하락 → 기업 전망 악화\n💼 실업률 상승 → 경기 침체 진행\n🛒 소비 위축 → 불황 본격화\n🏗️ 건설 착공 증가 → 경기 회복 기대\n\n경제 뉴스를 읽을 때\n이 신호들을 눈여겨봐요.",illust:"ep7-8.jpg"}
],
quiz:{q:"경기의 수준을 나타내며 선행·동행·후행 지수로 구분되는 지표는?",options:["소비자물가지수","경기종합지수","국내총생산","실업률"],answer:1,explain:"경기종합지수(CI)는 여러 경제지표를 합성해 경기를 종합적으로 보여주는 지수예요. 미래 예측용 선행, 현재 확인용 동행, 사후 검증용 후행 지수로 구성돼요."}},

{id:8,title:"주식이란 무엇인가",emoji:"📉",tag:"심화",
pages:[
{text:"\"아빠, 주식으로 돈 버는 거 맞아요?\"\n\n우노짱이 웃었다.\n\"벌 수도 있고 잃을 수도 있어.\n먼저 주식이 뭔지부터 알아야 해.\"",illust:"ep8-1.jpg"},
{text:"📖 주식이란?\n\n기업의 소유권을 잘게 나눈 증서예요.\n\n예시:\n어떤 기업을 100조각으로 나눴을 때\n그 중 1조각을 갖고 있으면\n그 기업의 1%를 소유한 것!\n\n주식 보유 = 주주 = 기업 일부 소유자",illust:"ep8-2.jpg"},
{text:"\"주가는 어떻게 결정돼요?\"\n\n오짱이 대답했다.\n\"사려는 사람(수요)이 많으면 오르고,\n팔려는 사람(공급)이 많으면 내려!\"\n\n우노짱이 덧붙였다.\n\"거기에 기업의 실적, 경기, 심리도 영향을 줘.\"",illust:"ep8-3.jpg"},
{text:"📖 주식 투자 핵심 지표\n\n📊 PER (주가수익비율)\n주가 ÷ 주당순이익(EPS)\n'이 주가가 이익 대비 얼마나 비싼가?'\n낮으면 저평가, 높으면 고평가 가능성\n\n📊 PBR (주가순자산비율)\n주가 ÷ 주당순자산(BPS)\n1배 미만 = 청산가치 이하 저평가",illust:"ep8-4.jpg"},
{text:"📖 ROE와 배당\n\nROE (자기자본이익률)\n순이익 ÷ 자기자본 × 100\n'자기 돈으로 얼마나 벌었나?'\n워런 버핏이 중시하는 핵심 지표\n\n배당: 기업이 이익 일부를 주주에게 나눠주는 것\n배당수익률 = 주당배당금 ÷ 주가 × 100",illust:"ep8-5.jpg"},
{text:"\"주식이 위험하다고 하던데요.\"\n\n우노짱이 말했다.\n\"단기로 사고팔면 위험해.\n하지만 좋은 기업을 오래 갖고 있으면\n시간이 갈수록 가치가 올라.\"",illust:"ep8-6.jpg"},
{text:"📖 투자 vs 투기\n\n💡 투자: 기업의 가치를 보고 장기 보유\n→ 기업 성장에 따른 수익 기대\n\n🎲 투기: 단기 가격 변동으로 수익 추구\n→ 도박과 유사, 높은 위험\n\n워런 버핏의 말:\n\"10년 보유할 주식이 아니라면\n10분도 보유하지 마라\"",illust:"ep8-7.jpg"},
{text:"\"분산투자가 중요하다고 하던데요?\"\n\n\"맞아. 계란을 한 바구니에 담지 마라!\"\n\n우노짱이 웃었다.\n\"ETF로 시작하면\n적은 돈으로도 분산투자가 가능해.\n나중에 자세히 배울 거야.\"",illust:"ep8-8.jpg"}
],
quiz:{q:"기업의 이익 대비 주가가 얼마나 비싼지를 나타내는 지표는?",options:["ROE","PBR","PER","EPS"],answer:2,explain:"PER(주가수익비율)은 주가를 주당순이익(EPS)으로 나눈 값이에요. 낮으면 저평가, 높으면 고평가 가능성이 있어 주식 분석의 기본 지표예요."}},

{id:9,title:"채권과 금리의 시소 게임",emoji:"⚖️",tag:"심화",
pages:[
{text:"\"아빠, 채권이 주식이랑 달라요?\"\n\n우노짱이 말했다.\n\"주식은 기업의 주인이 되는 거고,\n채권은 돈을 빌려주고 이자를 받는 거야.\"",illust:"ep9-1.jpg"},
{text:"📖 채권이란?\n\n정부·기업이 돈을 빌리면서 발행하는 차용증\n\n✅ 원금 + 이자를 약속함\n✅ 만기 기간 있음 (1년~30년)\n✅ 주식보다 안전하지만 수익률은 낮음\n\n국채(정부 발행), 회사채(기업 발행),\n금융채(은행 발행) 등으로 구분",illust:"ep9-2.jpg"},
{text:"\"채권 가격이 오르고 내리는 건 왜예요?\"\n\n오짱이 말했다.\n\"금리와 반대로 움직이거든!\"\n\n우노짱이 그림을 그렸다.\n금리↑ → 채권 가격↓\n금리↓ → 채권 가격↑",illust:"ep9-3.jpg"},
{text:"📖 왜 금리와 채권은 반비례할까?\n\n예시:\n• A채권: 연 3% 이자, 100만원\n• 시중 금리가 5%로 오르면?\n→ A채권 3%는 매력이 떨어짐\n→ A채권 가격 하락\n\n금리가 오르면 새 채권 이자가 높아지니\n기존 낮은 이자 채권은 덜 매력적!",illust:"ep9-4.jpg"},
{text:"📖 신용등급과 가산금리\n\n채권을 발행하는 곳의 신용도에 따라\n이자율이 달라져요.\n\nAAA (최우량) → 낮은 이자\nBBB (투자등급)\nBB 이하 (투기등급 = 정크본드) → 높은 이자\n\n신용이 낮을수록 더 많은 이자를 줘야\n투자자를 끌어들일 수 있어요.",illust:"ep9-5.jpg"},
{text:"\"장단기 금리차가 뭐예요?\"\n\n우노짱이 말했다.\n\"보통 오래 빌려줄수록 이자가 높아.\n10년 금리 > 2년 금리가 정상이야.\"\n\n\"근데 반대가 되면요?\"\n\n\"경기침체 신호야! 역전이 일어나면 긴장해야 해.\"",illust:"ep9-6.jpg"},
{text:"📖 장단기금리차 역전\n\n정상: 장기금리 > 단기금리\n역전: 단기금리 > 장기금리\n\n역전이 일어나면:\n투자자들이 '미래 경기가 나쁠 것'을 예상\n→ 장기 채권 매입 급증\n→ 장기 금리 하락\n→ 역전 발생\n\n미국에서 역전 이후 평균 12~18개월 내 경기침체",illust:"ep9-7.jpg"},
{text:"\"채권은 어떤 사람이 사나요?\"\n\n\"주로 보험사, 연금, 은행 같은\n큰 기관들이 사.\" 우노짱이 말했다.\n\n\"안전하게 돈을 굴리고 싶은\n개인들도 사고.\n금리가 높을 때 채권을 사면\n나중에 금리가 떨어지면 시세차익도 나.\"",illust:"ep9-8.jpg"}
],
quiz:{q:"금리가 오르면 기존 채권 가격은 어떻게 될까요?",options:["오른다","내려간다","변화없다","두 배가 된다"],answer:1,explain:"금리와 채권 가격은 반비례 관계예요. 금리가 오르면 새 채권의 이자가 높아지므로 기존 낮은 이자 채권은 매력이 떨어져 가격이 내려가요."}},

{id:10,title:"달러가 강해지면 뭐가 달라질까?",emoji:"💱",tag:"심화",
pages:[
{text:"뉴스에서 앵커가 말했다.\n\n\"원달러 환율이 1,400원을 돌파했습니다.\"\n\n\"아빠, 환율이 뭐예요?\"\n\n\"두 나라 돈의 교환 비율이야.\"",illust:"ep10-1.jpg"},
{text:"📖 환율이란?\n\n원/달러 환율 = 1달러를 사려면 필요한 원화\n\n환율 1,400원: 달러 1개 = 원화 1,400개\n\n환율이 오르면: 원화 가치↓ (원화 약세)\n환율이 내리면: 원화 가치↑ (원화 강세)\n\n💡 \"환율이 올랐다\" = 달러가 비싸졌다 = 원화 가치 하락",illust:"ep10-2.jpg"},
{text:"\"환율이 오르면 나쁜 건가요?\"\n\n우노짱이 말했다.\n\"나쁜 사람도, 좋은 사람도 있어.\n수출 기업은 좋아하고,\n수입 기업은 싫어해.\"",illust:"ep10-3.jpg"},
{text:"📖 환율 상승(원화 약세)의 영향\n\n✅ 좋은 점:\n• 수출기업 유리 (달러 수입→원화 환산 금액↑)\n• 외국인 관광객 증가 (한국이 싸 보임)\n\n❌ 나쁜 점:\n• 수입 원자재 가격↑\n• 해외여행 비용↑\n• 외채 부담↑\n• 수입 물가 상승→인플레 압력",illust:"ep10-4.jpg"},
{text:"\"환율은 왜 변해요?\"\n\n오짱이 말했다.\n\"달러가 많이 들어오면 달러 값이 내리고,\n달러가 많이 나가면 달러 값이 올라!\"\n\n\"그 외에도 금리 차이, 경기, 국제 정세가 영향을 줘.\"",illust:"ep10-5.jpg"},
{text:"📖 경상수지와 환율의 관계\n\n경상수지 흑자 (수출 > 수입)\n→ 달러 유입 많음\n→ 달러 공급↑\n→ 달러 가치↓ (원화 강세)\n\n경상수지 적자\n→ 달러 유출\n→ 달러 공급↓\n→ 달러 가치↑ (원화 약세)\n\n💡 한국은 수출 강국이라 경상수지 흑자가 지속되는 편",illust:"ep10-6.jpg"},
{text:"\"J커브 효과가 뭐예요?\"\n\n우노짱이 그림을 그렸다.\n\n\"환율이 올라도 처음에는\n무역수지가 더 나빠져.\n왜냐면 물량 조정이 가격보다 느리거든.\"\n\n\"결국 좋아지지만\n처음엔 J자처럼 먼저 내려가.\"",illust:"ep10-7.jpg"},
{text:"📖 구매력평가(PPP)\n\n물가 수준을 감안해 통화의 실질 구매력을 비교\n\n💡 빅맥지수:\n이코노미스트誌가 만든 PPP 비교 방법\n맥도날드 빅맥 가격으로 환율의 적정성 판단\n\n예시: 한국 빅맥 5,000원, 미국 $5\n→ 이론적 환율 1,000원\n→ 실제 환율 1,400원이면 원화 저평가",illust:"ep10-8.jpg"}
],
quiz:{q:"수출 기업은 원/달러 환율이 어떻게 변할 때 유리해질까요?",options:["환율이 내릴 때","환율이 오를 때","환율이 변하지 않을 때","환율과 무관"],answer:1,explain:"환율이 오르면 달러 수입을 원화로 바꿀 때 더 많은 원화를 받게 되므로 수출 기업은 유리해요. 반면 수입 기업은 원자재 비용이 올라 불리해요."}},

{id:11,title:"세계 경제를 움직이는 기관들",emoji:"🌐",tag:"심화",
pages:[
{text:"\"아빠, 국제 뉴스에서 IMF, WTO, OECD가 자꾸 나오는데\n그게 다 뭐예요?\"\n\n우노짱이 웃었다.\n\"세계 경제를 관리하는 기관들이야.\"",illust:"ep11-1.jpg"},
{text:"📖 IMF (국제통화기금)\n\n1945년 설립 | 미국 워싱턴 D.C.\n\n✅ 국제 통화 협력\n✅ 환율 안정 감시\n✅ 외환위기 국가에 구제금융\n\n한국은 1997년 외환위기 때\nIMF로부터 550억 달러 구제금융을 받았어요.\n국민들이 금을 모아 빚을 갚은 역사!",illust:"ep11-2.jpg"},
{text:"📖 BIS (국제결제은행)\n\n1930년 설립 | 스위스 바젤\n\n'중앙은행들의 중앙은행'\n\n✅ 금융규제 기준 제정\n(BIS 자기자본비율 = 은행 건전성 기준)\n✅ 중앙은행 간 결제 처리\n✅ 금융 안정 연구\n\nBIS 비율 최소 8%: 은행 안전성의 국제 기준",illust:"ep11-3.jpg"},
{text:"📖 OECD (경제협력개발기구)\n\n1961년 설립 | 프랑스 파리\n선진 38개국 회원\n한국은 1996년 가입\n\n✅ 경제정책 협력\n✅ 국가 간 경제지표 비교\n✅ 교육·복지·환경 정책 연구\n\n'OECD 평균'이라고 하면\n선진국 평균이라는 의미예요.",illust:"ep11-4.jpg"},
{text:"📖 WTO (세계무역기구)\n\n1995년 설립 | 스위스 제네바\n\n✅ 자유무역 촉진\n✅ 무역 분쟁 조정\n✅ 관세 인하 협상\n\n\"무역 분쟁의 국제 법원\"\n\n미중 무역전쟁, 반도체 수출규제 같은\n갈등도 WTO 틀 안에서 다뤄져요.",illust:"ep11-5.jpg"},
{text:"📖 G7 / G20\n\nG7: 미국·영국·프랑스·독일·이탈리아·캐나다·일본\n세계 주요 선진국 7개국 정상회의\n\nG20: G7 + 한국·중국·인도 등 20개국\n세계 GDP의 약 80%를 차지\n\n2008년 금융위기 대응으로\nG20의 역할이 크게 강화됐어요.",illust:"ep11-6.jpg"},
{text:"\"세계은행은요?\"\n\n오짱이 물었다.\n\n\"세계은행(World Bank)은\n개발도상국에 개발 자금을 빌려주는 기관이야.\"\n\n우노짱이 덧붙였다.\n\"IMF가 긴급 구조대라면,\n세계은행은 장기 개발 파트너야.\"",illust:"ep11-7.jpg"},
{text:"📖 국제기구와 우리나라\n\n한국은 이 기관들의 혜택을 받고\n이제는 기여하는 나라가 됐어요.\n\n• 1997년 IMF 수혜국\n→ 2001년 전액 상환\n• 2010년 G20 정상회의 서울 개최\n• 2020년대 BIS·OECD 기준 선도 국가\n\n경제 선진국으로의 여정이에요.",illust:"ep11-8.jpg"}
],
quiz:{q:"외환위기 시 구제금융을 지원하는 국제기구는?",options:["WTO","OECD","BIS","IMF"],answer:3,explain:"IMF(국제통화기금)는 외환위기에 처한 국가에 구제금융을 지원하는 국제기구예요. 한국은 1997년 외환위기 때 IMF의 지원을 받았어요."}},

{id:12,title:"인플레이션과 싸우는 법",emoji:"⚔️",tag:"심화",
pages:[
{text:"\"아빠, 요즘 뉴스에서 스태그플레이션이라는 말이 나오던데요.\"\n\n우노짱이 표정이 굳었다.\n\"그건 경제학자들이 가장 무서워하는 상황이야.\"",illust:"ep12-1.jpg"},
{text:"📖 스태그플레이션이란?\n\nStagnation(침체) + Inflation(인플레)의 합성어\n\n경기침체 + 물가상승이 동시에!\n\n💀 왜 무서울까?\n금리↑ → 물가↓ But 경기↓↓\n금리↓ → 경기↑ But 물가↑↑\n\n어떤 정책을 써도 한쪽이 더 나빠짐\n1970년대 오일쇼크 때 경험",illust:"ep12-2.jpg"},
{text:"📖 디플레이션의 함정\n\n물가가 내려가면 좋은 것 아닐까요?\n\n아니에요!\n\n물가↓ → '더 싸질 것' 기대\n→ 소비 미루기\n→ 기업 매출↓\n→ 고용↓\n→ 소득↓\n→ 소비 더 줄어\n→ 악순환!\n\n일본이 1990년대~2010년대 겪은 '잃어버린 30년'",illust:"ep12-3.jpg"},
{text:"\"그럼 적당한 인플레이션이 좋은 거네요.\"\n\n오짱이 말했다.\n\"맞아! 연 2%가 목표야.\n너무 낮으면 디플레 위험,\n너무 높으면 돈 가치 폭락!\"",illust:"ep12-4.jpg"},
{text:"📖 인플레이션과 싸우는 방법\n\n🏦 금리 인상 (가장 기본)\n→ 대출 줄고, 소비·투자↓ → 물가↓\n\n📉 긴축 재정\n→ 정부 지출 줄이고 세금↑ → 수요↓\n\n💬 기대 인플레이션 관리\n→ '물가가 안정될 것'이라는 믿음 심기\n중앙은행 발표 하나가 시장을 움직임",illust:"ep12-5.jpg"},
{text:"\"기대 인플레이션이 왜 중요해요?\"\n\n우노짱이 말했다.\n\"사람들이 '물가가 오를 것'이라 믿으면\n미리 가격을 올리거든.\n그럼 실제로 물가가 오르는 악순환!\n\n중앙은행이 신뢰를 얻는 게\n가장 강력한 인플레 억제 수단이야.\"",illust:"ep12-6.jpg"},
{text:"📖 인플레이션이 가져오는 불평등\n\n인플레이션은 모두에게 똑같이 나쁘지 않아요.\n\n✅ 자산가: 부동산·주식 가격↑ (유리)\n❌ 현금 보유자: 돈 가치↓ (불리)\n❌ 고정 수입자: 실질 소득↓ (불리)\n\n인플레이션은 '자산 없는 사람'에게\n더 가혹한 세금과 같아요.",illust:"ep12-7.jpg"},
{text:"\"그럼 어떻게 대비해야 해요?\"\n\n우노짱이 말했다.\n\"인플레이션을 이기려면\n물가보다 빠르게 자산을 늘려야 해.\"\n\n\"주식, 부동산, 채권을\n적절히 분산해서 갖고 있으면\n인플레이션을 이길 수 있어.\"",illust:"ep12-8.jpg"}
],
quiz:{q:"경기침체와 물가상승이 동시에 나타나는 현상은?",options:["디플레이션","인플레이션","스태그플레이션","리플레이션"],answer:2,explain:"스태그플레이션은 경기침체(Stagnation)와 인플레이션(Inflation)이 동시에 발생하는 현상이에요. 금리를 올리면 경기가 나빠지고, 내리면 물가가 오르는 딜레마에 빠져 대응이 매우 어려워요."}},

{id:13,title:"뉴스 속 경제 용어 해독법",emoji:"📰",tag:"실전",
pages:[
{text:"\"아빠, 경제 뉴스를 보면\n무슨 말인지 하나도 모르겠어요.\"\n\n우노짱이 웃었다.\n\"오늘 경제 뉴스 해독 특강이야!\"",illust:"ep13-1.jpg"},
{text:"📰 뉴스 해독 ①\n\"경상수지 50억 달러 흑자\"\n\n✅ 뜻: 수출·서비스 거래에서 우리나라가 외국보다\n50억 달러 더 벌었다\n\n💡 흑자: 돈이 들어옴 → 원화 강세 압력\n적자: 돈이 나감 → 원화 약세 압력\n\n한국은 주로 경상수지 흑자국!",illust:"ep13-2.jpg"},
{text:"📰 뉴스 해독 ②\n\"재정적자 확대, 국채 발행 증가\"\n\n✅ 뜻: 정부 지출이 세금 수입보다 많아\n국채(빚)를 더 발행했다\n\n💡 경기 침체 때 재정적자는 자연스러운 대응\nBut 만성적 적자 → 국가 신용도 하락\n이자 부담 증가 악순환",illust:"ep13-3.jpg"},
{text:"📰 뉴스 해독 ③\n\"연준 기준금리 0.25%p 인상\"\n\n✅ 뜻: 미국 중앙은행(Fed)이\n금리를 0.25%포인트 올렸다\n\n💡 한국에 미치는 영향:\n미국 금리↑ → 달러 강세\n→ 원화 약세 압력\n→ 한국도 금리 올릴 수밖에 없는 압박",illust:"ep13-4.jpg"},
{text:"📰 뉴스 해독 ④\n\"소비자물가 3.5% 상승\"\n\n✅ 뜻: 작년 같은 달보다 평균 물가가 3.5% 올랐다\n\n💡 2%가 목표인데 3.5%면 높은 것\n→ 금리 인상 압박\n→ 대출 이자 오를 수 있음\n\n핵심 체크: 근원물가(식품·에너지 제외)\n더 신뢰할 수 있는 물가 지표",illust:"ep13-5.jpg"},
{text:"📰 뉴스 해독 ⑤\n\"실업률 4.2%, 고용률 68.5%\"\n\n✅ 실업률: 일하려는 사람 중 못 취업한 비율\n✅ 고용률: 15세 이상 인구 중 일하는 비율\n\n💡 실업률이 낮아도 고용률이 낮으면?\n→ 구직 포기자가 많다는 뜻\n고용률이 더 정확한 경기 체온계!",illust:"ep13-6.jpg"},
{text:"📰 뉴스 해독 ⑥\n\"코스피 2,700 돌파, 외국인 순매수\"\n\n✅ 코스피: 한국 대표 주가지수\n✅ 외국인 순매수: 외국인이 주식을 더 많이 삼\n\n💡 외국인이 주식을 많이 사면\n달러가 들어와 원화 강세 효과\n\n코스피↑ = 경기 호조 기대 + 기업 실적 개선",illust:"ep13-7.jpg"},
{text:"\"이제 뉴스가 조금 이해돼요!\"\n\n오짱이 웃었다.\n\n\"경제 뉴스는 한 가지 사건이\n여러 곳에 연결되어 있어.\n\n금리 → 환율 → 물가 → 주가 →\n다시 소비 → 성장률...\n\n연결고리를 파악하면\n경제가 보이기 시작해!\"",illust:"ep13-8.jpg"}
],
quiz:{q:"미국 연준이 금리를 올리면 한국 원화에 어떤 영향이 주로 나타날까요?",options:["원화 강세","원화 약세","변화 없음","원화 폐지"],answer:1,explain:"미국 금리가 오르면 달러 강세 압력이 생겨 원화 가치가 하락(원화 약세)해요. 이를 막기 위해 한국도 금리를 올리는 압박을 받게 됩니다."}},

{id:14,title:"ETF로 시작하는 투자 첫걸음",emoji:"📊",tag:"실전",
pages:[
{text:"\"아빠, 저도 투자 시작하고 싶어요.\"\n\n우노짱이 진지하게 말했다.\n\"좋아. 그럼 먼저 ETF부터 알아보자.\n주식 초보한테 딱 맞는 투자 방법이야.\"",illust:"ep14-1.jpg"},
{text:"📖 ETF란?\n\nExchange Traded Fund\n상장지수펀드\n\n• 주식처럼 거래소에서 사고팔 수 있는 펀드\n• 특정 지수(코스피200, S&P500 등)를 추종\n• 1개만 사도 수십~수백 종목에 분산 투자\n\n✅ 낮은 비용 ✅ 분산투자 ✅ 높은 유동성",illust:"ep14-2.jpg"},
{text:"\"왜 ETF가 좋아요?\"\n\n오짱이 말했다.\n\"삼성전자 1주를 사면 삼성전자에만 투자하지만,\nS&P500 ETF 1주를 사면\n미국 상위 500개 기업에 한꺼번에 투자해!\"\n\n\"계란을 여러 바구니에 나눠 담는 거야.\"",illust:"ep14-3.jpg"},
{text:"📖 대표적인 ETF 종류\n\n🇺🇸 QQQ: 나스닥 100 추종\n🌍 SPY/IVV: S&P500 추종\n🇰🇷 KODEX200: 코스피200 추종\n💰 채권 ETF: 채권에 분산투자\n🥇 금 ETF: 금 가격 추종\n🏠 리츠(REITs): 부동산 간접투자",illust:"ep14-4.jpg"},
{text:"\"적립식 투자가 뭐예요?\"\n\n우노짱이 말했다.\n\"매달 정해진 날에 일정 금액을 투자하는 거야.\n주가가 쌀 때 많이 사고,\n비쌀 때 적게 사게 돼.\"\n\n\"이게 코스트 에버리징(평균 매입 단가 하락)이야.\"",illust:"ep14-5.jpg"},
{text:"📖 72의 법칙과 ETF 장기투자\n\nS&P500 지수 연평균 수익률 약 10%\n72÷10 = 7.2년마다 2배\n\n1,000만원 투자 시:\n7년 후: 2,000만원\n14년 후: 4,000만원\n21년 후: 8,000만원\n\n💡 핵심: 팔지 않고 오래 갖고 있는 것!",illust:"ep14-6.jpg"},
{text:"📖 투자 시 주의사항\n\n❌ 단기 수익 욕심 → 손실 위험↑\n❌ 빚 내서 투자 → 극도로 위험\n❌ 한 종목 몰빵 → 집중 리스크\n❌ 감정적 매매 → 고점 매수·저점 매도 패턴\n\n✅ 장기 적립식\n✅ 분산 투자\n✅ 여유 자금으로\n✅ 흔들리지 않기",illust:"ep14-7.jpg"},
{text:"\"그럼 연금저축펀드에 ETF를 담으면요?\"\n\n우노짱의 눈이 반짝였다.\n\"최강 조합!\n세금 혜택(연말정산 환급) +\nETF 분산투자 +\n장기 복리!\n\n납입액의 13.2~16.5%를 세금으로 돌려받아.\"",illust:"ep14-8.jpg"}
],
quiz:{q:"매달 일정 금액을 꾸준히 투자해 평균 매입 단가를 낮추는 투자 방법은?",options:["단기 매매","공매도","적립식 투자(코스트 에버리징)","레버리지 투자"],answer:2,explain:"적립식 투자(코스트 에버리징)는 매월 일정 금액을 투자해 주가가 낮을 때 많이 사고 높을 때 적게 사는 효과가 생겨 평균 매입 단가를 낮출 수 있어요."}},

{id:15,title:"부동산과 LTV·DSR 이야기",emoji:"🏠",tag:"실전",
pages:[
{text:"\"아빠, 집 살 때 LTV, DSR이 중요하다고 하던데\n그게 뭐예요?\"\n\n우노짱이 고개를 끄덕였다.\n\"부동산 대출의 핵심 규제야. 같이 알아보자.\"",illust:"ep15-1.jpg"},
{text:"📖 LTV (담보인정비율)\n\nLoan To Value\n\n담보 자산 가치 대비 대출 가능 금액 비율\n\n예시:\n10억 주택, LTV 70% 적용 시\n→ 최대 7억까지 대출 가능\n\n💡 LTV↑ = 더 많이 빌릴 수 있음\nLTV↓ = 자기 돈이 더 많이 필요함",illust:"ep15-2.jpg"},
{text:"📖 DSR (총부채원리금상환비율)\n\nDebt Service Ratio\n\n연 소득 대비 모든 금융부채 원리금 상환액 비율\n\nDSR = (연간 원리금 상환액 ÷ 연 소득) × 100\n\n✅ DSR 40% 기준:\n연 소득 5,000만원이면\n→ 연간 원리금 2,000만원 이하만 대출 가능",illust:"ep15-3.jpg"},
{text:"\"왜 이런 규제가 생겼어요?\"\n\n우노짱이 설명했다.\n\"집값이 너무 오르면\n빚을 너무 많이 져서 집을 사게 돼.\n그런데 집값이 떨어지면...\"\n\n\"빚만 남는 거네요!\"",illust:"ep15-4.jpg"},
{text:"📖 가계부채와 금융 안정\n\n한국 가계부채 = GDP의 약 100%\n(세계 최고 수준 중 하나)\n\n이게 왜 위험할까?\n집값 하락 + 금리 인상이 동시에 오면:\n→ 원리금 부담↑\n→ 소비 급감\n→ 경기 침체\n→ 집값 추가 하락\n→ 악순환!\n\nLTV·DSR 규제가 이 악순환을 막는 안전장치",illust:"ep15-5.jpg"},
{text:"\"전세는 어떻게 되는 건가요?\"\n\n오짱이 물었다.\n\n\"전세는 집 가격의 일부를 맡기고\n그 돈의 이자로 집을 사는 독특한 한국 제도야.\"\n\n우노짱이 설명했다.\n\"집주인이 이자를 줄 필요 없이\n세입자 돈을 쓸 수 있어.\"",illust:"ep15-6.jpg"},
{text:"📖 전세 vs 월세\n\n전세:\n목돈을 맡기고 무이자 주거\n전세금은 계약 만료 시 돌려받음\n단, 집값 하락 시 '깡통전세' 위험\n\n월세:\n매달 임대료 지급\n목돈 부담은 적지만 매달 비용 발생\n\n💡 금리가 높아지면 전세→월세 전환 증가",illust:"ep15-7.jpg"},
{text:"\"집은 투자로도 좋나요?\"\n\n우노짱이 말했다.\n\"부동산은 실거주 목적이 1순위야.\n투자로 볼 때는:\n위치, 교통, 학군, 공급량을 봐야 해.\n\n그리고 가장 중요한 건\n빚을 너무 많이 지지 않는 것!\n안전 마진을 항상 생각해.\"",illust:"ep15-8.jpg"}
],
quiz:{q:"담보 자산 가치 대비 대출 가능 금액의 비율을 나타내는 지표는?",options:["DSR","DTI","LTV","ROE"],answer:2,explain:"LTV(담보인정비율)는 담보 자산 가치 대비 대출 가능 금액의 비율이에요. LTV 70%이면 10억 자산에 최대 7억까지 대출받을 수 있어요."}},

{id:16,title:"미국 연준이 움직이면 한국이 흔들린다",emoji:"🦅",tag:"실전",
pages:[
{text:"\"아빠, 미국 연준 회의가 왜 우리한테 중요해요?\"\n\n우노짱이 진지하게 말했다.\n\"달러가 기축통화이기 때문이야.\n미국이 기침하면 전 세계가 감기 걸려.\"",illust:"ep16-1.jpg"},
{text:"📖 연준(Fed)이란?\n\nFederal Reserve System\n미국 중앙은행 시스템\n\nFOMC(연방공개시장위원회)가\n연 8회 금리를 결정\n\n결정 결과가 나오면:\n전 세계 주식·채권·외환 시장이 동시에 반응!",illust:"ep16-2.jpg"},
{text:"📖 달러의 특별한 지위: 기축통화\n\n기축통화 = 국제거래에서 기준이 되는 화폐\n\n원유를 사려면 달러가 필요!\n채권을 거래할 때도 달러!\n전 세계 외환보유액의 약 60%가 달러!\n\n이 힘이 있어서 미국 금리 결정이\n전 세계 경제를 좌우해요.",illust:"ep16-3.jpg"},
{text:"\"미국이 금리를 올리면 한국이 어떻게 돼요?\"\n\n오짱이 설명했다.\n\"달러가 강해지니까\n원화가 약해지고,\n외국인 투자자들이\n달러 자산으로 이동해!\"\n\n한국 주식·채권 시장에서 돈이 빠져나가!",illust:"ep16-4.jpg"},
{text:"📖 미국 금리 인상 → 한국 영향\n\n① 달러 강세 → 원화 약세\n② 외국인 자금 유출 (주식·채권)\n③ 수입 물가 상승\n④ 한국은행도 금리 인상 압박\n⑤ 대출 이자 증가 → 소비 위축\n\n신흥국(한국 포함)은\n미국 금리 정책에 크게 영향받아요.",illust:"ep16-5.jpg"},
{text:"\"외환보유액이 중요한 이유가 여기 있었군요?\"\n\n우노짱이 고개를 끄덕였다.\n\"맞아. 외환보유액이 많으면\n달러 공급으로 환율을 방어할 수 있어.\n\n한국 외환보유액은 약 4,000억 달러로\n세계 8위권이야.\"",illust:"ep16-6.jpg"},
{text:"📖 통화스왑\n\n두 나라가 서로의 통화를 교환하는 협정\n외환위기의 '최후 방어선'\n\n예: 한-미 통화스왑\n달러가 부족할 때 한국이 원화를 주고\n미국에서 달러를 빌릴 수 있어요.\n\n체결 소식만으로도 외환시장 안정 효과!",illust:"ep16-7.jpg"},
{text:"\"그래서 경제를 알면 뭐가 좋아요?\"\n\n우노짱이 말했다.\n\"미국 FOMC 발표 → 달러 강세 → 원화 약세\n→ 수입 물가↑ → 금리 인상 가능성↑\n→ 대출 이자↑\n\n이 연결고리가 보이면\n미리 준비할 수 있어.\n경제는 미래를 보는 눈이야.\"",illust:"ep16-8.jpg"}
],
quiz:{q:"국제거래에서 기준이 되는 화폐를 무엇이라고 할까요?",options:["준비통화","기축통화","결제통화","기본통화"],answer:1,explain:"기축통화는 국제 무역과 금융거래에서 기준이 되는 화폐예요. 현재 미국 달러가 기축통화 역할을 해서 미국의 금리 결정이 전 세계 경제에 큰 영향을 미쳐요."}},

{id:17,title:"ESG·핀테크·가상자산의 시대",emoji:"🌱",tag:"실전",
pages:[
{text:"\"아빠, 요즘 ESG, 핀테크, 비트코인\n이런 말들이 엄청 나오던데요.\"\n\n우노짱이 말했다.\n\"미래 경제의 핵심 키워드야. 같이 알아보자.\"",illust:"ep17-1.jpg"},
{text:"📖 ESG란?\n\nE: 환경(Environment)\nS: 사회(Social)\nG: 지배구조(Governance)\n\n기업을 평가할 때 재무 성과만이 아니라\n환경·사회·윤리 기준도 함께 보는 것\n\n기관투자자들이 ESG 점수가 낮은 기업에는\n투자를 안 하는 트렌드가 확산 중!",illust:"ep17-2.jpg"},
{text:"📖 핀테크(FinTech)란?\n\nFinance + Technology\n\n기술로 혁신한 금융 서비스:\n• 모바일 결제(카카오페이, 네이버페이)\n• P2P 대출\n• 로보어드바이저(AI 자산관리)\n• 인터넷전문은행(카카오뱅크, 토스뱅크)\n• 간편송금\n\n금융의 민주화를 이끌고 있어요.",illust:"ep17-3.jpg"},
{text:"📖 가상자산(암호화폐)이란?\n\n블록체인 기술 기반의 디지털 화폐\n대표: 비트코인, 이더리움\n\n특징:\n• 중앙은행이 없음 (탈중앙화)\n• 발행량이 정해져 있음 (비트코인: 2,100만개)\n• 익명성\n• 가격 변동성이 매우 큼!\n\n💡 법정화폐(원화, 달러)와 다름!",illust:"ep17-4.jpg"},
{text:"\"비트코인으로 돈 벌 수 있나요?\"\n\n우노짱이 진지하게 말했다.\n\"수익을 올린 사람도 있지만\n잃은 사람이 더 많아.\"\n\n\"가격 변동이 너무 크고,\n내재 가치를 측정하기 어려워.\n투자라기보단 투기에 가깝다고 보는 전문가가 많아.\"",illust:"ep17-5.jpg"},
{text:"📖 CBDC (중앙은행 디지털화폐)\n\n가상자산과 달리\n정부·중앙은행이 발행하는 디지털 화폐\n\n현금의 디지털 버전!\n\n✅ 빠른 거래\n✅ 투명한 추적 가능\n✅ 금융 포용성 확대\n\n한국은행도 CBDC 연구를 진행 중이에요.",illust:"ep17-6.jpg"},
{text:"📖 녹색채권 (그린본드)\n\n환경친화적 프로젝트 자금 조달을 위한 채권\n\n• 태양광·풍력 발전소 건설\n• 전기차 인프라\n• 에너지 효율화\n\nESG 투자 열풍으로\n그린본드 발행이 급증하고 있어요.\n미래 세대를 위한 투자!",illust:"ep17-7.jpg"},
{text:"\"이 세 가지가 연결되는 건가요?\"\n\n오짱이 말했다.\n\"맞아!\n\nESG(가치 있는 기업에 투자) +\n핀테크(쉽게 투자 가능) +\n블록체인(투명한 기록)\n\n이게 합쳐져서\n미래 금융의 모습이 될 거야!\"",illust:"ep17-8.jpg"}
],
quiz:{q:"환경(E), 사회(S), 지배구조(G)를 기준으로 기업을 평가하는 투자 기준은?",options:["ETF","GDP","ESG","BIS"],answer:2,explain:"ESG는 환경(Environment), 사회(Social), 지배구조(Governance)의 약자로, 기업의 비재무적 요소를 평가하는 기준이에요. 최근 기관투자자들이 투자 판단에 ESG를 반영하는 추세예요."}},

{id:18,title:"경제지표로 투자 타이밍 잡기",emoji:"⏰",tag:"실전",
pages:[
{text:"\"아빠, 경제지표를 보면\n언제 주식을 사야 하는지 알 수 있어요?\"\n\n우노짱이 말했다.\n\"완벽한 타이밍은 없어.\n하지만 흐름을 읽으면 유리해져.\"",illust:"ep18-1.jpg"},

// ──────────────────────────────────────────────
// SOUNDS
// ──────────────────────────────────────────────
function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    const configs={
      page:{freq:440,type:'sine',dur:0.08,vol:0.1},
      correct:{freq:523,type:'sine',dur:0.3,vol:0.15},
      wrong:{freq:220,type:'square',dur:0.2,vol:0.1},
      complete:{freq:659,type:'sine',dur:0.5,vol:0.15}
    };
    const c=configs[type]||configs.page;
    o.frequency.value=c.freq;o.type=c.type;
    g.gain.value=c.vol;
    o.start();o.stop(ctx.currentTime+c.dur);
  }catch(e){}
}

// STORAGE
// ──────────────────────────────────────────────
const SK='pureun-econ';
function saveProgress(data){try{localStorage.setItem(SK,JSON.stringify(data));}catch(e){}}
function loadProgress(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return {};}}

// ──────────────────────────────────────────────
// APP
// ──────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('onboarding');
  const [currentEP,setCurrentEP]=useState(null);
  const [page,setPage]=useState(0);
  const [showQuiz,setShowQuiz]=useState(false);
  const [selected,setSelected]=useState(null);
  const [progress,setProgress]=useState(loadProgress);
  const [showCert,setShowCert]=useState(false);

  const completedCount=Object.values(progress).filter(v=>v).length;
  const allDone=completedCount===EPISODES.length;

  function markDone(id){
    const np={...progress,[id]:true};
    setProgress(np);saveProgress(np);
    playSound('complete');
  }

  function openEP(ep){
    setCurrentEP(ep);setPage(0);setShowQuiz(false);setSelected(null);
    setScreen('reader');
  }

  function nextPage(){
    playSound('page');
    const ep=currentEP;
    if(page<ep.pages.length-1){setPage(p=>p+1);}
    else{setShowQuiz(true);}
  }

  function prevPage(){if(page>0){playSound('page');setPage(p=>p-1);}}

  function answerQuiz(i){
    if(selected!==null)return;
    setSelected(i);
    const correct=i===currentEP.quiz.answer;
    playSound(correct?'correct':'wrong');
    if(correct&&!progress[currentEP.id]){
      setTimeout(()=>markDone(currentEP.id),400);
    }
  }

  function backToHome(){setScreen('home');setCurrentEP(null);}

  // ONBOARDING
  if(screen==='onboarding') return e('div',{style:{minHeight:'100vh',background:'linear-gradient(135deg,#0f2027,#203a43,#2c5364)',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}},
    e('div',{style:{background:'rgba(255,255,255,0.05)',backdropFilter:'blur(20px)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'24px',padding:'36px 28px',maxWidth:'380px',width:'100%',textAlign:'center'}},
      e('div',{style:{fontSize:'64px',marginBottom:'16px'}},'📈'),
      e('div',{style:{fontSize:'28px',fontWeight:'800',background:'linear-gradient(90deg,#43cea2,#185a9d)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:'8px'}},'푸른시점'),
      e('div',{style:{fontSize:'16px',color:'#94a3b8',marginBottom:'24px'}},'경제편'),
      e('div',{style:{fontSize:'14px',color:'#cbd5e1',lineHeight:'1.7',marginBottom:'28px'}},
        '한국은행 경제금융용어 700선을 기반으로\n우노짱·오짱·푸른이가 함께 배우는\n경제 완전정복 19강.\n\n용돈 관리부터 주식·ETF·환율까지\n일상 속 경제를 쉽고 재미있게!'
      ),
      e('button',{onClick:()=>setScreen('home'),style:{width:'100%',padding:'16px',background:'linear-gradient(90deg,#43cea2,#185a9d)',color:'#fff',border:'none',borderRadius:'14px',fontSize:'16px',fontWeight:'700',cursor:'pointer',marginBottom:'12px'}},'시작하기'),
      e('div',{style:{fontSize:'11px',color:'#475569'}},'by UNO_DEYA · 한국은행 경제교육실 기반')
    )
  );

  // READER
  if(screen==='reader'&&currentEP){
    const ep=currentEP;
    const pg=ep.pages[page];
    const total=ep.pages.length;

    return e('div',{style:{minHeight:'100vh',background:'#0f1923',display:'flex',flexDirection:'column'}},
      // header
      e('div',{style:{background:'rgba(255,255,255,0.05)',padding:'14px 16px',display:'flex',alignItems:'center',gap:'12px',borderBottom:'1px solid rgba(255,255,255,0.08)'}},
        e('button',{onClick:backToHome,style:{background:'none',border:'none',color:'#94a3b8',fontSize:'20px',cursor:'pointer',padding:'4px'}},'←'),
        e('div',{style:{flex:1}},
          e('div',{style:{fontSize:'12px',color:'#64748b'}},`EP${ep.id} · ${ep.tag}`),
          e('div',{style:{fontSize:'14px',fontWeight:'700',color:'#e2e8f0'}}},ep.title)
        ),
        e('div',{style:{fontSize:'12px',color:'#64748b'}},`${showQuiz?'퀴즈':page+1+'/'+total}`)
      ),
      // progress bar
      e('div',{style:{height:'3px',background:'rgba(255,255,255,0.08)'}},
        e('div',{style:{height:'100%',background:'linear-gradient(90deg,#43cea2,#185a9d)',width:(showQuiz?100:(page+1)/total*100)+'%',transition:'width .3s'}})
      ),
      // content
      e('div',{style:{flex:1,overflow:'auto',padding:'20px 16px'}},
        showQuiz ? e('div',{},
          e('div',{style:{textAlign:'center',marginBottom:'24px'}},
            e('div',{style:{fontSize:'32px',marginBottom:'8px'}},'🤔'),
            e('div',{style:{fontSize:'18px',fontWeight:'800',color:'#e2e8f0',marginBottom:'4px'}},'퀴즈'),
            e('div',{style:{fontSize:'14px',color:'#94a3b8'}},'EP'+ep.id+' 복습 문제')

          e('div',{style:{background:'rgba(255,255,255,0.05)',borderRadius:'16px',padding:'20px',marginBottom:'20px',border:'1px solid rgba(255,255,255,0.08)'}},
            e('p',{style:{fontSize:'15px',lineHeight:'1.7',color:'#e2e8f0'}},ep.quiz.q)
          ),
          ep.quiz.options.map((opt,i)=>{
            let bg='rgba(255,255,255,0.04)';let bc='rgba(255,255,255,0.08)';let tc='#cbd5e1';

              e('span',{style:{marginRight:'8px'}},'ABCD'[i]+'. '),opt
            );
          }),
          selected!==null&&e('div',{style:{background:'rgba(67,206,162,0.08)',border:'1px solid rgba(67,206,162,0.2)',borderRadius:'12px',padding:'16px',marginTop:'4px'}},
            e('div',{style:{fontSize:'12px',color:'#43cea2',marginBottom:'6px'}},'💡 해설'),
            e('p',{style:{fontSize:'13px',color:'#94a3b8',lineHeight:'1.6'}},ep.quiz.explain)
          ),
          selected!==null&&e('button',{onClick:backToHome,style:{width:'100%',marginTop:'20px',padding:'16px',background:'linear-gradient(90deg,#43cea2,#185a9d)',color:'#fff',border:'none',borderRadius:'14px',fontSize:'15px',fontWeight:'700',cursor:'pointer'}},'목록으로 돌아가기')
        ) : e('div',{},
          e('div',{style:{background:'rgba(255,255,255,0.03)',borderRadius:'16px',minHeight:'180px',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:'20px',border:'1px solid rgba(255,255,255,0.06)',padding:'16px'}},
            e('div',{style:{fontSize:'64px',opacity:.3}},ep.emoji)
          ),
          e('div',{style:{fontSize:'15px',lineHeight:'1.8',color:'#e2e8f0',whiteSpace:'pre-line',wordBreak:'keep-all'}},pg.text)

      ),

      !showQuiz&&e('div',{style:{padding:'16px',display:'flex',gap:'10px',background:'rgba(0,0,0,0.3)',borderTop:'1px solid rgba(255,255,255,0.06)'}},

          '이전'
        ),
        e('button',{onClick:nextPage,style:{flex:2,padding:'14px',background:'linear-gradient(90deg,#43cea2,#185a9d)',border:'none',borderRadius:'12px',color:'#fff',fontSize:'15px',fontWeight:'700',cursor:'pointer'}},

  const [filter,setFilter]=useState('전체');

            e('div',{style:{fontSize:'11px',color:'#475569'}},'경제편 · by UNO_DEYA')
          )
        ),
        e('div',{style:{textAlign:'right'}},
          e('div',{style:{fontSize:'20px',fontWeight:'800',color:'#43cea2'}}},completedCount+'/'+EPISODES.length),
          e('div',{style:{fontSize:'11px',color:'#475569'}},'완료')

      EPISODES.filter(ep=>filter==='전체'||ep.tag===filter).map(ep=>{
        const done=!!progress[ep.id];
        return e('div',{key:ep.id,onClick:()=>openEP(ep),style:{background:done?'rgba(67,206,162,0.06)':'rgba(255,255,255,0.03)',border:'1px solid',borderColor:done?'rgba(67,206,162,0.2)':'rgba(255,255,255,0.07)',borderRadius:'16px',padding:'16px',marginBottom:'10px',cursor:'pointer',display:'flex',alignItems:'center',gap:'14px'}},
          e('div',{style:{width:'48px',height:'48px',borderRadius:'12px',background:done?'rgba(67,206,162,0.15)':'rgba(255,255,255,0.06)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'24px',flexShrink:0}},ep.emoji),
          e('div',{style:{flex:1,minWidth:0}},
            e('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'4px'}},
              e('span',{style:{fontSize:'11px',color:'#475569'}},'EP'+ep.id),
              e('span',{style:{fontSize:'11px',padding:'1px 7px',borderRadius:'10px',background:'rgba(255,255,255,0.05)',color:'#64748b'}}},ep.tag)
            ),
            e('div',{style:{fontSize:'14px',fontWeight:'700',color:done?'#43cea2':'#e2e8f0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}},ep.title),
            e('div',{style:{fontSize:'12px',color:'#475569',marginTop:'3px'}}},ep.pages.length+'페이지')
          ),
          e('div',{style:{fontSize:'18px',flexShrink:0}},done?'✅':'▶')
        );
      })
    ),
    // certificate
    allDone&&e('div',{style:{position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%)',zIndex:20}},
      e('button',{onClick:()=>setShowCert(true),style:{padding:'14px 28px',background:'linear-gradient(90deg,#f59e0b,#ef4444)',color:'#fff',border:'none',borderRadius:'20px',fontSize:'14px',fontWeight:'700',cursor:'pointer',boxShadow:'0 4px 20px rgba(245,158,11,0.4)'}},
        '🏆 수료증 보기'
      )
    ),
    showCert&&e('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.9)',zIndex:30,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}},
      e('div',{style:{background:'linear-gradient(135deg,#1a2f3a,#0f1923)',border:'2px solid #43cea2',borderRadius:'20px',padding:'32px',maxWidth:'360px',width:'100%',textAlign:'center'}},
        e('div',{style:{fontSize:'48px',marginBottom:'12px'}},'🏆'),
        e('div',{style:{fontSize:'22px',fontWeight:'800',color:'#f59e0b',marginBottom:'4px'}},'수료증'),
        e('div',{style:{fontSize:'16px',color:'#43cea2',fontWeight:'700',marginBottom:'16px'}},'푸른시점 경제편 완주!'),
        e('div',{style:{fontSize:'13px',color:'#94a3b8',lineHeight:'1.7',marginBottom:'24px'}},
          '경제 기초부터 실전 투자까지\nEP1~19 전 강의를 완주했습니다.\n\n이제 경제 뉴스가 다르게 보일 거예요. 📈'
        ),
        e('div',{style:{fontSize:'12px',color:'#475569',marginBottom:'16px'}},'by UNO_DEYA · '+new Date().toLocaleDateString('ko-KR')),
        e('button',{onClick:()=>setShowCert(false),style:{width:'100%',padding:'14px',background:'linear-gradient(90deg,#43cea2,#185a9d)',color:'#fff',border:'none',borderRadius:'12px',fontSize:'15px',fontWeight:'700',cursor:'pointer'}},'닫기')
      )
    )
  );
}

function HomeWithFilter(){
  return e(App,{});
}

const e=React.createElement;
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
</script>
</body>
