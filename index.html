<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a3a2a">
<title>푸른시점 경제편</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--warm:#F0FFF8;--warm2:#C8F0DA;--text:#1a3a2a;--text2:#4a7a5a;--text3:#8ab4a0;--border:#B8E8CC;--green:#2ecc71;--teal:#1abc9c;--blue:#3498db}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--warm);height:100dvh;display:flex;flex-direction:column;max-width:420px;margin:0 auto;overflow:hidden}
#root{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.home{flex:1;display:flex;flex-direction:column;overflow:hidden}
.home-header{padding:14px 16px 10px;background:var(--warm);border-bottom:1px solid var(--border);flex-shrink:0}
.home-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.home-title{font-size:20px;font-weight:900;color:#1a5a3a;letter-spacing:-.5px}
.home-sub{font-size:10px;color:var(--teal);font-weight:700;letter-spacing:.5px;margin-left:4px}
.prog-track{height:5px;background:#C8F0DA;border-radius:3px;overflow:hidden;margin-bottom:3px}
.prog-fill{height:100%;background:linear-gradient(90deg,#2ecc71,#1abc9c);border-radius:3px;transition:width .4s}
.prog-info{display:flex;justify-content:space-between;font-size:10px;color:var(--text3)}
.tabs{display:flex;border-bottom:2px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab.act{color:var(--teal);border-bottom-color:var(--teal)}
.ep-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 24px}
.ep-card{background:#fff;border-radius:14px;margin-bottom:8px;display:flex;overflow:hidden;border:1.5px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05);cursor:pointer;transition:all .2s}
.ep-card.done{background:#F0FFF5;border-color:#2ecc71}
.ep-thumb{width:88px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px;background:var(--warm);border-right:1px dashed var(--border);font-size:32px}
.ep-body{flex:1;padding:10px 12px}
.ep-tags{display:flex;gap:4px;margin-bottom:4px;align-items:center}
.ep-num-tag{font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px}
.ep-title{font-size:12px;font-weight:800;color:var(--text);line-height:1.35;margin-bottom:3px}
.ep-meta{font-size:10px;color:var(--text3)}
.reader{flex:1;display:flex;flex-direction:column;overflow:hidden}
.reader-hd{padding:10px 13px;display:flex;align-items:center;gap:9px;background:var(--warm);border-bottom:2px dashed var(--border);flex-shrink:0}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text)}
.ep-hd-info{flex:1}
.ep-hd-num{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--text3)}
.ep-hd-title{font-size:12px;font-weight:800;color:var(--text)}
.prog-dots{display:flex;gap:3px;align-items:center}
.prog-dot{height:4px;border-radius:2px;background:var(--border);transition:all .3s}
.prog-dot.act{width:14px}
.prog-dot:not(.act){width:4px}
.page-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{padding:14px}
.illust-box{border-radius:14px;overflow:hidden;margin-bottom:12px}
.illust-ph{height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border:2px dashed var(--border)}
.illust-caption{padding:7px 12px;background:rgba(0,0,0,.03);font-size:11px;font-weight:700;color:var(--text2);text-align:center;border-top:1px solid var(--border)}
.bubbles{display:flex;flex-direction:column;gap:9px;margin-bottom:12px}
.brow{display:flex;gap:9px;align-items:flex-end}
.brow.right{flex-direction:row-reverse}
.avatar-emoji{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:2px solid rgba(0,0,0,.07)}
.bubble{max-width:76%;padding:9px 12px;border-radius:13px;font-size:14px;line-height:1.7;font-weight:500}
.bubble.left{background:#fff;border:1.5px solid var(--border);border-bottom-left-radius:3px;color:var(--text)}
.bubble.right{border-bottom-right-radius:3px;color:#fff}
.bname{font-size:9px;font-weight:700;margin-bottom:3px;opacity:.75}
.fact-title{font-size:13px;font-weight:800;color:#1a5a3a;margin-bottom:10px;text-align:center}
.fact-box{border-radius:12px;padding:12px 14px;margin-bottom:8px;border-left:4px solid}
.fact-ico{font-size:18px;margin-bottom:3px;display:block}
.fact-t{font-size:12px;font-weight:800;margin-bottom:3px}
.fact-d{font-size:13px;line-height:1.7;color:var(--text)}
.quiz-title{font-size:13px;font-weight:800;color:#1a5a3a;text-align:center}
.quiz-prog{display:flex;gap:4px;justify-content:center;margin:8px 0 12px}
.quiz-prog-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.quiz-prog-dot.done{background:#2ecc71}
.quiz-prog-dot.curr{background:#1a5a3a;transform:scale(1.3)}
.quiz-box{background:#F0FFF5;border-radius:13px;padding:13px;border:2px solid #B8E8CC}
.quiz-q{font-size:13px;font-weight:800;color:#1a5a3a;margin-bottom:10px;line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:6px}
.quiz-opt{background:#fff;border:2px solid #C8F0DA;border-radius:10px;padding:9px 13px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);text-align:left;transition:all .2s}
.quiz-opt.correct{background:#E8F8E8;border-color:#2ecc71;color:#1a5a3a}
.quiz-opt.wrong{background:#FFF0F0;border-color:#e74c3c;color:#c0392b}
.quiz-result{font-size:12px;font-weight:700;text-align:center;padding:8px;border-radius:9px;margin-top:7px}
.deep-note{background:linear-gradient(135deg,#E8FFF0,#C8F0DA);border-radius:12px;padding:12px 14px;border:1.5px solid var(--border);margin-top:8px}
.deep-note-title{font-size:11px;font-weight:800;color:var(--teal);margin-bottom:6px}
.deep-note-text{font-size:13px;color:var(--text);line-height:1.75}
.complete-box{text-align:center;padding:24px 14px;position:relative;overflow:hidden}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(400px) rotate(720deg);opacity:0}}
.confetti-dot{position:absolute;width:8px;height:8px;border-radius:50%;animation:confettiFall linear forwards;pointer-events:none}
@keyframes spin{from{transform:rotate(-20deg)scale(.5)}to{transform:rotate(0)scale(1)}}
.complete-star{font-size:52px;margin-bottom:10px;display:block;animation:spin .6s ease}
.complete-title{font-size:20px;font-weight:800;color:#1a5a3a;margin-bottom:5px}
.complete-sub{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:16px}
.review-card{background:#fff;border-radius:14px;padding:14px;border:2px solid var(--border);margin-bottom:14px;text-align:left}
.review-card-title{font-size:10px;font-weight:800;color:var(--teal);margin-bottom:8px}
.review-item{display:flex;gap:7px;font-size:13px;color:var(--text);margin-bottom:6px;line-height:1.55;align-items:flex-start}
.review-num{width:20px;height:20px;border-radius:50%;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.next-box{border-radius:14px;padding:14px;margin-bottom:12px;color:#fff;text-align:left}
.next-label{font-size:9px;font-weight:700;opacity:.75;margin-bottom:4px;letter-spacing:1px}
.next-title{font-size:14px;font-weight:800;margin-bottom:5px}
.next-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;color:#fff;cursor:pointer}
.cert-btn{width:100%;padding:13px;border-radius:14px;border:none;cursor:pointer;font-size:14px;font-weight:800;background:linear-gradient(135deg,#2ecc71,#1abc9c);color:#fff;margin-top:4px}
.page-nav{display:flex;gap:7px;padding:10px 13px;border-top:2px dashed var(--border);background:var(--warm);flex-shrink:0}
.nav-btn{flex:1;padding:12px;border-radius:12px;border:none;cursor:pointer;font-size:13px;font-weight:800;transition:all .2s}
.nav-prev{background:#C8F0DA;color:#1a5a3a}
.nav-next{color:#fff;background:linear-gradient(135deg,#2ecc71,#1abc9c)}
.nav-btn:disabled{opacity:.28;cursor:default}
.ob{flex:1;display:flex;flex-direction:column;align-items:center;padding:28px 20px 32px;background:linear-gradient(160deg,var(--warm),var(--warm2));overflow-y:auto;text-align:center}
.ob-title{font-size:26px;font-weight:800;color:#1a5a3a;margin-bottom:8px}
.ob-desc{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:24px;white-space:pre-line}
.ob-btn{width:100%;padding:14px;border-radius:14px;border:none;cursor:pointer;font-size:14px;font-weight:800;background:linear-gradient(135deg,#2ecc71,#1abc9c);color:#fff;margin-bottom:8px}
.ob-skip{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;padding:4px}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>

const CONFETTI=['#2ecc71','#1abc9c','#3498db','#9b59b6','#f39c12','#e74c3c'];

function Confetti(){
  const dots=Array.from({length:20},(_,i)=>({id:i,color:CONFETTI[i%6],left:Math.random()*100,delay:Math.random()*.8,dur:1.2+Math.random()*.8}));
  return e('div',{style:{position:'absolute',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',overflow:'hidden'}},
    dots.map(d=>e('div',{key:d.id,className:'confetti-dot',style:{background:d.color,left:d.left+'%',top:'-10px',animationDuration:d.dur+'s',animationDelay:d.delay+'s'}}))
  );
}

function AvatarEl({ch}){
  if(ch.img) return e('img',{src:ch.img,style:{width:34,height:34,borderRadius:'50%',objectFit:'cover',border:'2px solid rgba(0,0,0,.07)',flexShrink:0}});
  return e('div',{className:'avatar-emoji',style:{background:ch.bg}},ch.emoji);
}

function BubbleRow({b}){

    ),

  );

function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    const t=ctx.currentTime;
    if(type==='correct'){
      o.type='sine';o.frequency.setValueAtTime(523,t);o.frequency.setValueAtTime(659,t+.12);o.frequency.setValueAtTime(784,t+.24);
      g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);
      o.start(t);o.stop(t+.5);
    }else if(type==='wrong'){
      o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.setValueAtTime(150,t+.1);
      g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);
      o.start(t);o.stop(t+.3);
    }else if(type==='complete'){
      [523,659,784,1047].forEach((freq,i)=>{
        const oi=ctx.createOscillator(),gi=ctx.createGain();
        oi.connect(gi);gi.connect(ctx.destination);
        oi.type='sine';oi.frequency.setValueAtTime(freq,t+i*.1);
        gi.gain.setValueAtTime(.25,t+i*.1);gi.gain.exponentialRampToValueAtTime(.001,t+i*.1+.4);
        oi.start(t+i*.1);oi.stop(t+i*.1+.4);
      });
    }else{
      o.type='sine';o.frequency.setValueAtTime(440,t);
      g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);
      o.start(t);o.stop(t+.1);
    }
  }catch{}
}

        ),
        P.type==='complete'&&e('div',{className:'complete-box'},
          e(Confetti),
          e('span',{className:'complete-star'},'🌟'),
          e('div',{className:'complete-title'},'EP'+ep.num+' 완료!'),
          e('div',{className:'complete-sub'},'퀴즈 '+quizDone+'/'+quizCount+' 완료! 😊'),
          e('div',{className:'review-card'},
            e('div',{className:'review-card-title'},'📋 핵심 요약'),
            (P.review||[]).map((r,i)=>e('div',{key:i,className:'review-item'},
              e('div',{className:'review-num',style:{background:ep.color}},i+1),r
            ))
          ),
          P.nextNum>0&&e('div',{className:'next-box',style:{background:'linear-gradient(135deg,'+ep.color+',#1abc9c)'}},
            e('div',{className:'next-label'},'NEXT EPISODE'),
            e('div',{className:'next-title'},'EP'+P.nextNum+' · '+P.nextTitle),
            e('div',{style:{fontSize:12,opacity:.85,lineHeight:1.5,marginBottom:10,whiteSpace:'pre-line'}},P.nextPreview),
            e('button',{className:'next-btn',onClick:()=>startEp(curEpIdx+1)},'다음화 보기 →')
          ),
          P.nextNum<0&&e('button',{onClick:()=>setScreen('cert'),className:'cert-btn',style:{marginTop:8}},'🎉 수료증 받기!')
        )
      )
    ),
    e('div',{className:'page-nav'},
      e('button',{className:'nav-btn nav-prev',onClick:()=>{
        const prev=page-1;setPage(prev);
        try{localStorage.setItem(SK+'_p'+curEpIdx,String(prev));}catch{}
      },disabled:page===0},'← 이전'),
      e('button',{className:'nav-btn nav-next',
        style:{background:canNext?'linear-gradient(135deg,'+ep.color+',#1abc9c)':'#ccc'},
        onClick:()=>{
          if(isLast){
            const nd=new Set(doneEps);nd.add(curEpIdx);setDoneEps(nd);saveDone(nd);
            try{localStorage.removeItem(SK+'_p'+curEpIdx);}catch{}
            playSound('complete');setScreen('home');
          }else{
            const next=page+1;setPage(next);playSound('page');
            try{localStorage.setItem(SK+'_p'+curEpIdx,String(next));}catch{}
          }
        },
        disabled:!canNext
      },isLast?'완료! 🌟':'다음 →')
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
</script>
</body>
</html>
